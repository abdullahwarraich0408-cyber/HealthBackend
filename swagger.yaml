openapi: 3.0.0
info:
  title: PharmaHub API
  version: 1.0.0
  description: API Documentation for PharmaHub Multi-Vendor Backend
servers:
  - url: http://localhost:5000/api
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: API is running
  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
