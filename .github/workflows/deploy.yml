name: Deploy PharmaHub Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SSH_USER: root
  APP_DIR: /opt/pharmahub-backend

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: pharmahub_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.APP_HOST }}" ]; then
            echo "::error::Missing GitHub secret APP_HOST (backend server IP, e.g. 188.166.179.160)"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Missing GitHub secret SSH_PRIVATE_KEY (private key for root@${{ secrets.APP_HOST }})"
            exit 1
          fi
          if [ -z "${{ secrets.STRIPE_SECRET_KEY }}" ]; then
            echo "::error::Missing GitHub secret STRIPE_SECRET_KEY"
            exit 1
          fi
          echo "Deploy secrets present"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.APP_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync files to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude 'IAC' \
            --exclude 'logs' \
            --exclude 'tests' \
            ./ "${{ env.SSH_USER }}@${{ secrets.APP_HOST }}:${{ env.APP_DIR }}/"

      - name: Install and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/pharmahub-backend

            touch .env
            set_env() {
              KEY="$1"
              VAL="$2"
              if grep -q "^${KEY}=" .env; then
                sed -i "s|^${KEY}=.*|${KEY}=${VAL}|" .env
              else
                echo "${KEY}=${VAL}" >> .env
              fi
            }

            set_env STRIPE_SECRET_KEY "${{ secrets.STRIPE_SECRET_KEY }}"
            if [ -n "${{ secrets.FRONTEND_URL }}" ]; then
              set_env FRONTEND_URL "${{ secrets.FRONTEND_URL }}"
            else
              set_env FRONTEND_URL "https://hub.asrar.dev"
            fi
            set_env STRIPE_CURRENCY "pkr"
            set_env ENABLE_TEST_AUTH "true"

            npm ci --production
            npx prisma generate

            npx prisma db push --accept-data-loss || {
              echo "❌ prisma db push failed — check DATABASE_URL and server logs"
              exit 1
            }

            if [ -f prisma/migrations/20250625100000_firebase_auth/migration.sql ]; then
              npx prisma db execute \
                --file prisma/migrations/20250625100000_firebase_auth/migration.sql \
                --schema prisma/schema.prisma || {
                echo "⚠️ Auth migration SQL failed — check DATABASE_URL and server logs"
              }
            fi

            node migrate-auth.js || true

            if pm2 describe pharmahub-api > /dev/null 2>&1; then
              pm2 restart pharmahub-api --update-env
            else
              pm2 start ecosystem.config.js --env production
            fi

            pm2 save
            echo "✅ Deploy complete!"
